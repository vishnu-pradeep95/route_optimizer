# Override for license validation E2E tests.
# Usage: docker compose -f docker-compose.yml -f docker-compose.license-test.yml up -d api-license-test
# Starts a production-mode API on port 8001 with invalid license for 503 testing.

services:
  api-license-test:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - LICENSE_KEY=invalid-test-key-for-e2e
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
      - API_KEY=${API_KEY:-}
      - GOOGLE_MAPS_API_KEY=not-needed-for-license-test
    volumes:
      - /etc/machine-id:/etc/machine-id:ro   # Machine identity for license fingerprint
    depends_on:
      db:
        condition: service_healthy
    # No healthcheck needed -- we EXPECT it to return 503

  # Security pipeline E2E test container (valid license, low revalidation interval).
  # Used for integrity tamper detection and periodic re-validation tests.
  api-security-test:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=production
      - REVALIDATION_INTERVAL=10
      - LICENSE_KEY=${SECURITY_TEST_LICENSE_KEY}
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
      - API_KEY=${API_KEY:-}
      - GOOGLE_MAPS_API_KEY=not-needed-for-security-test
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
    depends_on:
      db:
        condition: service_healthy

  # Fingerprint mismatch E2E test container (license bound to fake fingerprint).
  # Used for fingerprint rejection tests.
  api-fingerprint-test:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - ENVIRONMENT=production
      - LICENSE_KEY=${FINGERPRINT_TEST_LICENSE_KEY}
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
      - API_KEY=${API_KEY:-}
      - GOOGLE_MAPS_API_KEY=not-needed-for-fingerprint-test
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
    depends_on:
      db:
        condition: service_healthy
