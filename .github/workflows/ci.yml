# =============================================================================
# GitHub Actions CI — Kerala Delivery Route Optimizer
# =============================================================================
# Runs on every push and pull request to main.
#
# What it does:
#   1. Test: run the full pytest suite (211+ tests)
#   2. Dashboard: verify TypeScript compiles and React builds
#   3. Docker: verify Docker images build successfully (push to main only)
#
# Future additions (when dependencies are added):
#   - Lint: ruff check (add when ruff is in requirements.txt)
#   - Type check: mypy (add when mypy is configured)
#
# Why CI matters for a solo dev project:
# - Catches bugs before they hit production (especially after late-night commits)
# - Validates that the Docker build still works (easy to break with new files)
# - Gives confidence that refactoring didn't break existing features
# - When contributors join, CI prevents bad merges automatically
#
# Cost: GitHub Actions is free for public repos (2,000 minutes/month for private).
# This pipeline runs in ~2-3 minutes, so even daily pushes are well within limits.
# See: https://docs.github.com/en/actions/learn-github-actions
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch.
# Why? Saves CI minutes and avoids confusing results from stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python Tests ──────────────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip packages between runs. Saves ~30s on dependency install.
          # The cache key includes requirements.txt hash, so it invalidates
          # when dependencies change.
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          # --tb=short: concise tracebacks (full output is noisy in CI logs)
          # -q: quiet mode (show dots, not full test names)
          # Tests use mocks for OSRM/VROOM/Google/PostgreSQL, so no Docker needed.
          python -m pytest tests/ -q --tb=short
        env:
          # Disable rate limiting in tests — it causes flaky failures.
          RATE_LIMIT_ENABLED: "false"
          # Use a dummy DATABASE_URL — tests that need DB mock the connection.
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          ENVIRONMENT: "development"

  # ── Dashboard Build ───────────────────────────────────────────────────────
  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/kerala_delivery/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/kerala_delivery/dashboard
        run: npm ci

      - name: Type check + Build
        working-directory: apps/kerala_delivery/dashboard
        run: npm run build

  # ── Docker Build ──────────────────────────────────────────────────────────
  # Verify the Dockerfile builds successfully. Doesn't push anywhere —
  # just confirms the image can be constructed from the current code.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only run Docker build on pushes to main (not on every PR commit).
    # Docker builds are slower (~2 min) and less likely to break.
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/Dockerfile -t routing-opt-api:ci .

      - name: Build Dashboard image
        run: docker build -f infra/Dockerfile.dashboard -t routing-opt-dashboard:ci .

      - name: Verify API image boots
        run: |
          # Start the API container briefly to verify it boots without errors.
          # It will fail to connect to DB/OSRM/VROOM, but we check that the
          # Python process starts and the import chain works.
          docker run --rm -d \
            --name api-smoke-test \
            -e DATABASE_URL="postgresql+asyncpg://test:test@localhost:5432/test" \
            -e ENVIRONMENT="development" \
            routing-opt-api:ci
          sleep 5
          # Fail CI if the container crashed on import
          if ! docker ps --format '{{.Names}}' | grep -q api-smoke-test; then
            echo "Container crashed. Logs:"
            docker logs api-smoke-test 2>&1 || true
            exit 1
          fi
          docker stop api-smoke-test
