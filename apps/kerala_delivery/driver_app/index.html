<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0B0B0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LPG Delivery Route</title>
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts — Outfit (display/UI) + JetBrains Mono (data/numbers).
         Outfit has excellent readability at mobile sizes. JetBrains Mono is
         the clearest monospace for numeric data like distances/weights.
         CDN handles subsetting, caching, font-display:swap automatically. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS — lightweight open-source map library (no API key needed) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Tailwind CSS + DaisyUI — compiled from pwa-input.css via scripts/build-pwa-css.sh -->
    <link rel="stylesheet" href="tailwind.css">
    <style>
        /* ============================================================
           Driver PWA v2 — "Field Operations Terminal"
           Dark-first design for outdoor readability in Kerala sun.
           Outfit (UI) + JetBrains Mono (data).
           Saffron #FF9410 accent — high visibility against dark base.
           Electric green #00C853 for delivered, hot red #FF3B30 for failed.
           60px minimum touch targets, 66px primary navigate button.
           WCAG AAA (7:1) contrast throughout.
           No countdown timers — Kerala MVD compliance.
           ============================================================ */
        :root {
            --font-ui: 'Outfit', -apple-system, sans-serif;
            --font-data: 'JetBrains Mono', 'Courier New', monospace;
            --color-bg: #0B0B0F;
            --color-surface: #13131A;
            --color-surface-2: #1A1A24;
            --color-header: #0B0B0F;
            --color-accent: #FF9410;
            --color-accent-glow: rgba(255,148,16,0.25);
            --color-accent-dim: #CC7600;
            --color-success: #00C853;
            --color-success-bg: rgba(0,200,83,0.08);
            --color-danger: #FF3B30;
            --color-danger-bg: rgba(255,59,48,0.08);
            --color-text: #F0EFFB;
            --color-text-secondary: #A3A2BC;
            --color-border: #1E1E2E;
            --color-border-bright: #2E2E42;
            --radius-card: 14px;
            --radius-btn: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            background: var(--color-bg);
            color: var(--color-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* Subtle dot-grid background — gives depth to the dark canvas */
            background-image: radial-gradient(circle, #1E1E2E 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* ============================================================
           Header — sticky top bar
           ============================================================ */
        .header {
            background: rgba(11,11,15,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--color-text);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
        }
        .header h1 {
            font-family: var(--font-ui);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--color-text);
        }
        .header .stats {
            font-family: var(--font-data);
            font-size: 14px;
            color: var(--color-text);
            font-weight: 500;
            margin-top: 1px;
        }

        /* ============================================================
           Tabs — List / Map switcher
           ============================================================ */
        .tabs {
            display: flex;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }
        .tab {
            flex: 1;
            padding: 0 16px;
            height: 48px;
            text-align: center;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            transition: color 0.2s;
            position: relative;
            letter-spacing: 0.01em;
        }
        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--color-accent);
            border-radius: 2px 2px 0 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tab.active {
            color: var(--color-accent);
        }
        .tab.active::after { opacity: 1; }

        /* ============================================================
           Map
           ============================================================ */
        #map {
            width: 100%;
            height: 50vh;
            display: none;
        }
        #map.visible { display: block; }

        /* ============================================================
           Stop list
           ============================================================ */
        .stop-list {
            display: none;
            padding: 12px 12px 16px;
        }
        .stop-list.visible { display: block; }

        /* ============================================================
           Hero card — next delivery, prominent and elevated
           ============================================================ */
        .hero-card {
            background: var(--color-surface);
            border: 2px solid var(--color-accent);
            border-radius: var(--radius-card);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 0 30px var(--color-accent-glow), 0 4px 20px rgba(0,0,0,0.4);
        }
        .hero-label {
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 800;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }
        .hero-address {
            font-family: var(--font-ui);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--color-text);
            margin-bottom: 8px;
        }
        .hero-meta {
            font-family: var(--font-data);
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .hero-notes {
            font-family: var(--font-ui);
            font-size: 14px;
            color: var(--color-text);
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--color-surface-2);
            border-radius: 8px;
            border-left: 3px solid var(--color-accent);
            line-height: 1.4;
        }
        .hero-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }
        .hero-actions .btn-navigate {
            width: 100%;
            height: 66px;
            font-size: 17px;
        }
        .hero-actions .btn-row {
            display: flex;
            gap: 8px;
        }
        .hero-actions .btn-deliver {
            flex: 1;
            height: 60px;
            font-size: 15px;
        }
        .hero-actions .btn-fail {
            width: 80px;
            min-width: 80px;
            height: 60px;
            font-size: 15px;
        }

        /* ============================================================
           Compact stop card — smaller, less prominent than hero
           ============================================================ */
        .compact-card {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 12px 12px 12px 0;
            margin-bottom: 6px;
            display: flex;
            gap: 0;
            align-items: center;
            border: 1px solid var(--color-border);
            overflow: hidden;
            position: relative;
            transition: opacity 0.3s, background 0.3s;
        }
        .compact-card::before {
            content: '';
            width: 4px;
            min-height: 100%;
            flex-shrink: 0;
            align-self: stretch;
        }
        .compact-card.pending::before { background: var(--color-border-bright); }
        .compact-card.delivered::before { background: var(--color-success); }
        .compact-card.failed::before    { background: var(--color-danger); }
        .compact-card.delivered, .compact-card.failed {
            opacity: 0.55;
        }
        .compact-card.delivered { background: var(--color-success-bg); }
        .compact-card.failed    { background: var(--color-danger-bg); }
        .compact-card .stop-number { width: 40px; min-width: 40px; }
        .compact-card .stop-info {
            flex: 1;
            padding: 0;
        }
        .compact-card .stop-address {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
            line-height: 1.3;
        }
        .compact-card .stop-meta {
            font-family: var(--font-data);
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .compact-card .status-chip {
            margin-top: 4px;
        }

        /* ============================================================
           Toast notification — centered feedback on action
           ============================================================ */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 32px;
            border-radius: 12px;
            font-family: var(--font-ui);
            font-size: 18px;
            font-weight: 700;
            z-index: 2000;
            animation: toast-in 0.2s ease-out, toast-out 0.3s ease-in 1.2s forwards;
            pointer-events: none;
        }
        .toast-delivered { background: var(--color-success); color: #000; }
        .toast-failed    { background: var(--color-danger); color: #FFF; }

        @keyframes toast-in  { from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes toast-out { from { opacity: 1; } to { opacity: 0; } }

        /* Sequence number badge */
        .stop-number {
            width: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 0;
        }
        .stop-number-inner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--color-surface-2);
            border: 1.5px solid var(--color-border-bright);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-data);
            font-weight: 700;
            font-size: 14px;
            color: var(--color-text);
        }
        .compact-card.delivered .stop-number-inner {
            border-color: var(--color-success);
            color: var(--color-success);
        }
        .compact-card.failed .stop-number-inner {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        /* Stop content */
        .stop-info {
            flex: 1;
            padding: 2px 0;
        }
        .stop-address {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.35;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .stop-meta {
            font-family: var(--font-data);
            font-size: 14px;
            color: var(--color-text-secondary);
            letter-spacing: 0.01em;
        }
        /* Action buttons — large tap targets, thumb-reachable at bottom */
        .btn {
            padding: 0 14px;
            border: none;
            border-radius: var(--radius-btn);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            height: 60px;
            transition: transform 0.1s, opacity 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.01em;
        }
        .btn:active { transform: scale(0.95); opacity: 0.85; }

        .btn-navigate {
            background: var(--color-accent);
            color: #000000;
            flex: 1;
            height: 66px;
            font-size: 15px;
            font-weight: 800;
            box-shadow: 0 4px 20px var(--color-accent-glow);
        }
        .btn-navigate:hover { background: #FFB040; }

        .btn-deliver {
            background: rgba(0,200,83,0.15);
            color: var(--color-success);
            border: 1.5px solid rgba(0,200,83,0.4);
            flex: 1;
        }
        .btn-deliver:hover {
            background: rgba(0,200,83,0.25);
        }

        .btn-fail {
            background: rgba(255,59,48,0.1);
            color: var(--color-danger);
            border: 1.5px solid rgba(255,59,48,0.3);
            width: 60px;
            min-width: 60px;
            font-size: 18px;
        }
        .btn-fail:hover { background: rgba(255,59,48,0.2); }

        /* ============================================================
           Upload section — hero screen on first open
           ============================================================ */
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 57px);
            padding: 32px 24px;
            text-align: center;
        }

        /* Gas cylinder SVG illustration area */
        .upload-icon {
            width: 88px;
            height: 88px;
            background: var(--color-surface-2);
            border: 2px solid var(--color-border-bright);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 40px;
            box-shadow: 0 0 40px rgba(255,148,16,0.12);
        }

        .upload-section h2 {
            font-family: var(--font-ui);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            color: var(--color-text);
        }
        .upload-section p {
            color: var(--color-text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
            line-height: 1.5;
            max-width: 280px;
        }
        .upload-btn {
            background: var(--color-accent);
            color: #000000;
            padding: 0 32px;
            height: 60px;
            border-radius: 14px;
            font-family: var(--font-ui);
            font-size: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 8px 32px var(--color-accent-glow);
            transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .upload-btn:hover {
            background: #FFB040;
            box-shadow: 0 12px 40px rgba(255,148,16,0.35);
            transform: translateY(-1px);
        }
        .upload-btn:active { transform: scale(0.97); }
        #file-input { display: none; }

        #upload-status {
            margin-top: 20px;
            font-family: var(--font-data);
            font-size: 14px;
            color: var(--color-text-secondary);
            min-height: 20px;
        }

        /* ============================================================
           Vehicle selector
           ============================================================ */
        .vehicle-selector {
            padding: 16px 12px 16px;
            display: none;
        }
        .vehicle-selector.visible { display: block; }
        .vehicle-selector h2 {
            font-family: var(--font-ui);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }
        .vehicle-btn {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 16px;
            margin-bottom: 8px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            text-align: left;
            cursor: pointer;
            min-height: 64px;
            transition: border-color 0.15s, background 0.15s;
            gap: 4px;
        }
        .vehicle-btn:hover {
            border-color: var(--color-accent);
            background: var(--color-surface-2);
        }
        .vehicle-btn .v-name {
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 15px;
            color: var(--color-text);
        }
        .vehicle-btn .v-stats {
            font-family: var(--font-data);
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        /* Back button */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-btn);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            min-height: 48px;
            transition: border-color 0.15s, color 0.15s;
        }
        .back-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

        /* ============================================================
           Header action buttons
           ============================================================ */
        .header-actions {
            display: none;
            gap: 6px;
            flex-direction: row;
            align-items: center;
        }
        .header-btn {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border-bright);
            color: var(--color-text-secondary);
            width: 38px;
            height: 38px;
            border-radius: 9px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .header-btn:hover {
            background: var(--color-border-bright);
            color: var(--color-text);
        }
        .header-btn:active {
            background: rgba(255,148,16,0.15);
            color: var(--color-accent);
        }

        /* ============================================================
           All-done completion banner
           ============================================================ */
        .all-done-banner {
            background: linear-gradient(135deg, #004D20, #006628);
            border: 1px solid rgba(0,200,83,0.3);
            color: var(--color-success);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-ui);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
            border-radius: var(--radius-card);
        }
        .all-done-close {
            background: none;
            border: none;
            color: var(--color-success);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            opacity: 0.7;
        }
        .all-done-close:hover { opacity: 1; }

        /* ============================================================
           Delivered/failed status chips (inline in stop card)
           ============================================================ */
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
        }
        .status-chip.delivered { color: var(--color-success); }
        .status-chip.failed    { color: var(--color-danger); }

        /* ============================================================
           Segmented progress bar — one segment per stop
           ============================================================ */
        .progress-bar {
            display: flex;
            gap: 3px;
            height: 8px;
            padding: 0 16px;
            margin: 8px 0 0;
            background: transparent;
        }
        .progress-segment {
            flex: 1;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .progress-delivered { background: var(--color-success); }
        .progress-failed    { background: var(--color-danger); }
        .progress-current   { background: var(--color-accent); }
        .progress-pending   { background: var(--color-border); }

        /* Refresh row — below progress bar */
        .refresh-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px 8px;
            font-family: var(--font-ui);
            font-size: 14px;
        }
        .refresh-row .last-updated {
            color: var(--color-text-secondary);
        }
        .refresh-row .btn-refresh {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border-bright);
            color: var(--color-text);
            padding: 0 16px;
            height: 36px;
            border-radius: var(--radius-btn);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-row .btn-refresh:active {
            background: rgba(255,148,16,0.15);
            border-color: var(--color-accent);
        }

    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 id="header-title">LPG Delivery Route</h1>
        <div class="stats" id="header-stats"></div>
    </div>
    <!-- Action buttons — hidden until a route is loaded.
         ⟳ reloads route data from server (e.g. supervisor re-ran optimization).
         ⇄ returns to vehicle selector so driver can switch without a page reload. -->
    <div id="header-actions" class="header-actions">
        <button class="header-btn" onclick="reloadCurrentRoute()" title="Reload route from server">&#x29F3;</button>
        <button class="header-btn" onclick="changeVehicle()" title="Switch to a different vehicle">&#x21C4;</button>
    </div>
</div>

<!-- Progress bar + refresh row (hidden until route loaded) -->
<div id="progress-section" style="display: none; background: rgba(11,11,15,0.92); border-bottom: 1px solid var(--color-border);">
    <div id="progress-bar" class="progress-bar"></div>
    <div class="refresh-row">
        <span id="last-updated" class="last-updated">--</span>
        <button class="btn-refresh" onclick="reloadCurrentRoute()">&#x21BB; Refresh</button>
    </div>
</div>

<!-- Upload section (initial state) -->
<div id="upload-section" class="upload-section">
    <div class="upload-icon">🛺</div>
    <h2>Today's Deliveries</h2>
    <p>Upload the CDCMS export (CSV or Excel) to generate optimized routes</p>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Delivery List
    </button>
    <input type="file" id="file-input" accept=".csv,.xlsx,.xls" onchange="handleFileUpload(this)">
    <div id="upload-status"></div>
</div>

<!-- Vehicle selector (after upload) -->
<div id="vehicle-selector" class="vehicle-selector">
    <h2>Select Your Vehicle</h2>
    <div id="vehicle-list"></div>
</div>

<!-- Route view (after vehicle selection) -->
<div id="route-view" style="display: none;">
    <div class="tabs">
        <button class="tab active" onclick="showTab('list')">📋 Delivery List</button>
        <button class="tab" onclick="showTab('map')">🗺️ Map View</button>
    </div>
    <div id="map"></div>
    <div id="stop-list" class="stop-list visible"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// State
// ============================================================
const API_BASE = window.location.origin;
let currentRoute = null;
let map = null;
let markers = [];

// GPS telemetry interval ID (cleared when route is unloaded).
// Sends pings to /api/telemetry every TELEMETRY_INTERVAL_MS while
// the driver has an active route. Enables speed alerts and live
// tracking on the ops dashboard.
let telemetryIntervalId = null;
const TELEMETRY_INTERVAL_MS = 15_000; // 15 seconds — balance accuracy vs battery

// ============================================================
// Auth Header Helper
// ============================================================
// The API requires X-API-Key on all POST endpoints when API_KEY
// is set on the server. The driver app reads the key from
// localStorage (set via a config screen or injected at deploy).
// In dev mode (no key set), the header is omitted and the server
// allows all requests.
function getAuthHeaders() {
    const headers = {};
    const apiKey = localStorage.getItem('lpg_api_key');
    if (apiKey) {
        headers['X-API-Key'] = apiKey;
    }
    return headers;
}

// Helper for authenticated POST requests
async function authPost(url, body, isJson = true) {
    const headers = { ...getAuthHeaders() };
    const opts = { method: 'POST', headers };
    if (isJson) {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
    } else {
        // FormData — let browser set Content-Type with boundary
        opts.body = body;
    }
    return fetch(url, opts);
}

// ============================================================
// Service Worker Registration
// ============================================================
// Register the service worker so the app shell loads offline.
// Must be done early so subsequent page loads are controlled by the SW.
// See: https://web.dev/articles/service-worker-lifecycle
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
        .then(reg => {
            console.log('[App] SW registered, scope:', reg.scope);
            // Immediately check for a SW update so version bumps take effect
            // on the NEXT normal page load, not just the next 24h check cycle.
            reg.update();
        })
        .catch(err => console.warn('[App] SW registration failed:', err));

    // When a new SW activates (after version bump + clients.claim()),
    // reload the page so the fresh app shell is served immediately.
    // Without this, the driver sees stale UI until they manually refresh.
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[App] New SW activated — reloading for fresh content');
        window.location.reload();
    });
}

// ============================================================
// Offline Status Indicator
// ============================================================
// Show/hide a banner when connectivity changes so the driver knows
// their status updates are being queued, not lost.
window.addEventListener('online', () => {
    document.getElementById('offline-banner')?.remove();
    // Replay any queued status updates that accumulated while offline
    replayOfflineQueue();
});

window.addEventListener('offline', () => {
    if (!document.getElementById('offline-banner')) {
        const banner = document.createElement('div');
        banner.id = 'offline-banner';
        banner.style.cssText = 'position:fixed;top:48px;left:0;right:0;background:#FF9410;color:#000000;text-align:center;padding:8px;font-family:Outfit,sans-serif;font-size:14px;font-weight:700;z-index:1001;letter-spacing:0.01em;';
        banner.textContent = '📡 Offline — updates will sync when connected';
        document.body.prepend(banner);
    }
});

// ============================================================
// localStorage helpers for offline support
// ============================================================
// Why localStorage instead of IndexedDB?
// Route data is small (< 100 KB for 50 stops) and localStorage is
// simpler to use. IndexedDB would be overkill for this data size.
// All route data and the offline queue live in localStorage.

const STORAGE_KEYS = {
    ROUTE_DATA: 'lpg_current_route',
    ROUTES_LIST: 'lpg_routes_list',
    VEHICLE_ID: 'lpg_current_vehicle',
    OFFLINE_QUEUE: 'lpg_offline_queue',
    LAST_UPDATED: 'lpg_last_updated',
};

function saveToStorage(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify(data));
    } catch (e) {
        // localStorage full — very unlikely for our data size
        console.warn('[Storage] Failed to save:', key, e);
    }
}

function loadFromStorage(key) {
    try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
    } catch (e) {
        console.warn('[Storage] Failed to load:', key, e);
        return null;
    }
}

// ============================================================
// Progress Bar, Header Stats, Refresh Row
// ============================================================
// Segmented progress bar shows one colored segment per stop.
// Header stats show "X of Y delivered" format.
// Refresh row shows last-updated timestamp and manual refresh button.

function updateProgressBar() {
    if (!currentRoute) return;
    const bar = document.getElementById('progress-bar');
    const nextIdx = currentRoute.stops.findIndex(s => s.status === 'pending');
    bar.innerHTML = currentRoute.stops.map((stop, i) => {
        let cls = 'progress-pending';
        if (stop.status === 'delivered') cls = 'progress-delivered';
        else if (stop.status === 'failed') cls = 'progress-failed';
        else if (i === nextIdx) cls = 'progress-current';
        return `<div class="progress-segment ${cls}"></div>`;
    }).join('');
}

function updateHeaderStats() {
    if (!currentRoute) return;
    const done = currentRoute.stops.filter(s => s.status === 'delivered').length;
    const total = currentRoute.stops.length;
    document.getElementById('header-stats').textContent = `${done} of ${total} delivered`;
}

function updateRefreshRow() {
    const ts = loadFromStorage(STORAGE_KEYS.LAST_UPDATED);
    const el = document.getElementById('last-updated');
    if (ts && el) {
        const d = new Date(ts);
        el.textContent = `Last updated: ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }
}

function checkAllDone() {
    if (!currentRoute) return;
    const done = currentRoute.stops.filter(s => s.status === 'delivered').length;
    const failed = currentRoute.stops.filter(s => s.status === 'failed').length;
    const remaining = currentRoute.stops.filter(s => s.status === 'pending').length;
    const allDone = remaining === 0 && (done + failed) > 0;
    const existing = document.getElementById('all-done-banner');
    if (allDone && !existing) {
        const banner = document.createElement('div');
        banner.id = 'all-done-banner';
        banner.className = 'all-done-banner';
        const failNote = failed > 0 ? ` \u00B7 ${failed} failed` : '';
        banner.innerHTML = `
            <div>Route complete! ${done} delivered${failNote}</div>
            <button class="all-done-close" onclick="this.parentElement.remove()">&#x2715;</button>
        `;
        document.getElementById('stop-list').prepend(banner);
    } else if (!allDone && existing) {
        existing.remove();
    }
}

// ============================================================
// Offline Queue for Status Updates
// ============================================================
// When a driver marks a delivery as delivered/failed while offline,
// the update is queued in localStorage. When connectivity returns,
// the queue is replayed in order.

function queueOfflineUpdate(vehicleId, orderId, status) {
    const queue = loadFromStorage(STORAGE_KEYS.OFFLINE_QUEUE) || [];
    queue.push({
        vehicleId,
        orderId,
        status,
        timestamp: new Date().toISOString(),
    });
    saveToStorage(STORAGE_KEYS.OFFLINE_QUEUE, queue);
}

async function replayOfflineQueue() {
    const queue = loadFromStorage(STORAGE_KEYS.OFFLINE_QUEUE) || [];
    if (queue.length === 0) return;

    console.log(`[Offline] Replaying ${queue.length} queued updates`);
    const remaining = [];

    for (const item of queue) {
        try {
            const resp = await authPost(
                `${API_BASE}/api/routes/${item.vehicleId}/stops/${item.orderId}/status`,
                { status: item.status },
            );
            if (!resp.ok) remaining.push(item); // Keep failed items for retry
        } catch {
            remaining.push(item); // Network still down, keep in queue
            break; // Stop trying — we're still offline
        }
    }

    saveToStorage(STORAGE_KEYS.OFFLINE_QUEUE, remaining);
    if (remaining.length === 0) {
        console.log('[Offline] All queued updates replayed successfully');
    }
}

// ============================================================
// XSS Prevention — escape untrusted strings before HTML insertion
// ============================================================
// Why? renderStopList() and showVehicleSelector() use innerHTML with
// server data (addresses, notes, driver names). If that data ever
// contains HTML tags (e.g., a malicious address like
// "<script>alert(1)<\/script>"), the browser would execute it.
// This helper escapes the 5 HTML-significant characters.
// See: https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
// ============================================================
// App Initialization — restore cached state on load
// ============================================================
// On page load, check if we have cached route data from a previous session.
// This lets the driver refresh the page or lose connectivity and still see
// their route. The data was saved when they first loaded the route.
window.addEventListener('DOMContentLoaded', () => {
    // Show offline banner if currently offline
    if (!navigator.onLine) {
        window.dispatchEvent(new Event('offline'));
    }

    const cachedVehicleId = loadFromStorage(STORAGE_KEYS.VEHICLE_ID);
    const cachedRoute = loadFromStorage(STORAGE_KEYS.ROUTE_DATA);

    if (cachedRoute && cachedVehicleId) {
        // Restore previously loaded route
        currentRoute = cachedRoute;
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('route-view').style.display = 'block';
        document.getElementById('progress-section').style.display = 'block';
        document.getElementById('header-title').textContent = currentRoute.driver_name;
        renderStopList();
        updateRefreshRow();
        // Show header action buttons so driver isn't stuck if wrong route was restored
        document.getElementById('header-actions').style.display = 'flex';
        // Resume telemetry for the cached route
        startTelemetry();
    }

    // Replay any offline queued updates
    if (navigator.onLine) {
        replayOfflineQueue();
    }
});

// ============================================================
// File Upload → Optimize → Show Vehicle Selector
// ============================================================
async function handleFileUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const status = document.getElementById('upload-status');
    status.textContent = 'Uploading and optimizing routes...';

    const formData = new FormData();
    formData.append('file', file);

    try {
        const resp = await authPost(`${API_BASE}/api/upload-orders`, formData, false);

        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.detail || 'Upload failed');
        }

        const summary = await resp.json();
        const solveTime = summary.optimization_time_ms != null
            ? summary.optimization_time_ms.toFixed(0) : '?';
        status.textContent = `✅ ${summary.orders_assigned} orders assigned to ${summary.vehicles_used} vehicles (${solveTime}ms)`;

        // Fetch all routes and show vehicle selector
        const routesResp = await fetch(`${API_BASE}/api/routes`);
        const routesData = await routesResp.json();

        // Cache routes list for offline access
        saveToStorage(STORAGE_KEYS.ROUTES_LIST, routesData.routes);

        showVehicleSelector(routesData.routes);

    } catch (err) {
        status.textContent = `❌ Error: ${err.message}`;
    }
}

// ============================================================
// Vehicle Selector
// ============================================================
function showVehicleSelector(routes) {
    document.getElementById('upload-section').style.display = 'none';
    const selector = document.getElementById('vehicle-selector');
    selector.classList.add('visible');

    const list = document.getElementById('vehicle-list');
    // Prepend a back-to-upload button so the driver isn't stuck here
    // if they need to upload a new list or arrived by mistake.
    list.innerHTML = `
        <button class="back-btn" onclick="goToUpload()">&#8592; Upload New List</button>
        ${routes.map(r => `
        <button class="vehicle-btn" onclick="loadRoute('${escapeHtml(r.vehicle_id)}')">
            <div class="v-name">🚛 ${escapeHtml(r.driver_name)} (${escapeHtml(r.vehicle_id)})</div>
            <div class="v-stats">
                ${r.total_stops} stops · ${r.total_distance_km} km · ~${Math.round(r.total_duration_minutes)} min · ${r.total_weight_kg} kg
            </div>
        </button>
        `).join('')}
    `;
}

// ============================================================
// Load a specific driver's route
// ============================================================
async function loadRoute(vehicleId) {
    document.getElementById('vehicle-selector').classList.remove('visible');
    document.getElementById('route-view').style.display = 'block';
    // Show the reload / change-vehicle buttons in the header
    document.getElementById('header-actions').style.display = 'flex';

    try {
        const resp = await fetch(`${API_BASE}/api/routes/${vehicleId}`);
        currentRoute = await resp.json();
    } catch {
        // Network failed — try loading from localStorage cache
        const cached = loadFromStorage(STORAGE_KEYS.ROUTE_DATA);
        if (cached && cached.vehicle_id === vehicleId) {
            currentRoute = cached;
        } else {
            alert('Cannot load route — no network and no cached data.');
            return;
        }
    }

    // Cache route data in localStorage for offline access.
    // This is the key offline mechanism: once the driver loads their route
    // while online, it's available even if they lose signal.
    saveToStorage(STORAGE_KEYS.ROUTE_DATA, currentRoute);
    saveToStorage(STORAGE_KEYS.VEHICLE_ID, vehicleId);
    saveToStorage(STORAGE_KEYS.LAST_UPDATED, new Date().toISOString());

    document.getElementById('header-title').textContent = currentRoute.driver_name;
    document.getElementById('progress-section').style.display = 'block';
    updateHeaderStats();
    updateProgressBar();
    updateRefreshRow();

    renderStopList();

    // Start GPS telemetry for speed alerts + live tracking
    startTelemetry();
}

// ============================================================
// Render the delivery stop list — hero card + compact list
// ============================================================
// The next pending stop is rendered as a prominent hero card at the top.
// All other stops render as compact cards below it.
// When all stops are done, checkAllDone() shows the completion banner.

function renderStopList() {
    const container = document.getElementById('stop-list');
    if (!currentRoute || !currentRoute.stops) {
        container.innerHTML = '';
        return;
    }

    const nextStop = currentRoute.stops.find(s => s.status === 'pending');
    const otherStops = currentRoute.stops.filter(s => s !== nextStop);

    container.innerHTML = [
        nextStop ? renderHeroCard(nextStop) : '',
        ...otherStops.map(s => renderCompactCard(s)),
    ].join('');

    updateProgressBar();
    updateHeaderStats();
    checkAllDone();
}

// Hero card — prominent display for the next delivery
function renderHeroCard(stop) {
    const total = currentRoute.stops.length;
    const distInfo = stop.distance_from_prev_km > 0
        ? `${stop.distance_from_prev_km} km away`
        : '';
    const refInfo = stop.customer_ref
        ? `<div class="hero-meta">Ref: ${escapeHtml(stop.customer_ref)}</div>`
        : '';
    return `
    <div class="hero-card" id="stop-${escapeHtml(stop.order_id)}">
        <div class="hero-label">NEXT DELIVERY &middot; Stop ${stop.sequence} of ${total}</div>
        <div class="hero-address">${escapeHtml(stop.address) || 'Address pending'}</div>
        <div class="hero-meta">
            ${stop.quantity} cyl &middot; ${stop.weight_kg} kg${distInfo ? ` &middot; ${distInfo}` : ''}
        </div>
        ${refInfo}
        ${stop.notes ? `<div class="hero-notes">${escapeHtml(stop.notes)}</div>` : ''}
        <div class="hero-actions">
            <button class="btn btn-navigate" onclick="navigateTo(${stop.latitude}, ${stop.longitude})">
                &#x2316; Navigate
            </button>
            <div class="btn-row">
                <button class="btn btn-deliver" onclick="markDelivered('${escapeHtml(currentRoute.vehicle_id)}', '${escapeHtml(stop.order_id)}')">
                    &#x2713; Done
                </button>
                <button class="btn btn-fail" onclick="markFailed('${escapeHtml(currentRoute.vehicle_id)}', '${escapeHtml(stop.order_id)}')">
                    &#x2715; Fail
                </button>
            </div>
        </div>
    </div>`;
}

// Compact card — smaller display for remaining stops (no action buttons)
function renderCompactCard(stop) {
    const statusClass = escapeHtml(stop.status);
    const isPending = stop.status === 'pending';
    return `
    <div class="compact-card ${statusClass}" id="stop-${escapeHtml(stop.order_id)}">
        <div class="stop-number">
            <div class="stop-number-inner">${stop.sequence}</div>
        </div>
        <div class="stop-info">
            <div class="stop-address">${escapeHtml(stop.address) || 'Address pending'}</div>
            <div class="stop-meta">
                ${stop.quantity} cyl &middot; ${stop.weight_kg} kg
                ${stop.distance_from_prev_km > 0 ? ` &middot; ${stop.distance_from_prev_km} km` : ''}
            </div>
            ${!isPending ? `<div class="status-chip ${statusClass}">
                ${stop.status === 'delivered' ? '&#x2713; Delivered' : '&#x2715; Failed'}
            </div>` : ''}
        </div>
    </div>`;
}

// ============================================================
// Toast notifications — centered feedback on delivery actions
// ============================================================
function showToast(message, type) {
    // Remove any existing toast
    document.querySelector('.toast')?.remove();
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1500);
}

// ============================================================
// Map view
// ============================================================
function initMap() {
    if (map) return;
    map = L.map('map');

    // OpenStreetMap tiles — free, no API key needed
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
    }).addTo(map);
}

function showRouteOnMap() {
    if (!currentRoute || !currentRoute.stops.length) return;
    initMap();

    // Clear previous markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const coords = [];

    // Add stop markers
    currentRoute.stops.forEach(stop => {
        const latlng = [stop.latitude, stop.longitude];
        coords.push(latlng);

        const color = stop.status === 'delivered' ? '#00C853'
            : stop.status === 'failed' ? '#FF3B30' : '#FF9410';
        const textColor = stop.status === 'pending' ? '#000' : '#fff';

        const icon = L.divIcon({
            className: '',
            html: `<div style="background:${color};color:${textColor};width:30px;height:30px;
                border-radius:50%;display:flex;align-items:center;justify-content:center;
                font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;
                border:2px solid rgba(255,255,255,0.9);box-shadow:0 3px 8px rgba(0,0,0,0.5)">
                ${stop.sequence}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14],
        });

        const marker = L.marker(latlng, { icon }).addTo(map);
        // XSS defence: stop.address comes from the database (originally from CSV
        // uploads). Must escape before passing to bindPopup(), which uses innerHTML.
        marker.bindPopup(`<b>Stop ${stop.sequence}</b><br>${escapeHtml(stop.address)}<br>${stop.quantity} cyl · ${stop.weight_kg} kg`);
        markers.push(marker);
    });

    // Draw route line
    if (coords.length > 1) {
        const line = L.polyline(coords, { color: '#FF9410', weight: 3, opacity: 0.85 });
        markers.push(line);
        line.addTo(map);
    }

    // Fit map to show all stops
    if (coords.length > 0) {
        map.fitBounds(coords, { padding: [30, 30] });
    }
}

// ============================================================
// Tab switching
// ============================================================
function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('map').classList.remove('visible');
    document.getElementById('stop-list').classList.remove('visible');

    if (tab === 'map') {
        document.getElementById('map').classList.add('visible');
        document.querySelectorAll('.tab')[1].classList.add('active');
        // Initialize map on first view
        setTimeout(() => {
            showRouteOnMap();
            map?.invalidateSize();
        }, 100);
    } else {
        document.getElementById('stop-list').classList.add('visible');
        document.querySelectorAll('.tab')[0].classList.add('active');
    }
}

// ============================================================
// Navigation — open Google Maps directions
// ============================================================
function navigateTo(lat, lon) {
    // Opens Google Maps navigation in a new tab/app
    // This works on Android and iOS, launching the Maps app if installed
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`, '_blank');
}

// ============================================================
// Status updates (with offline queue support)
// ============================================================
async function markDelivered(vehicleId, orderId) {
    await updateStatus(vehicleId, orderId, 'delivered');
}

async function markFailed(vehicleId, orderId) {
    if (confirm('Mark this delivery as failed?')) {
        await updateStatus(vehicleId, orderId, 'failed');
    }
}

async function updateStatus(vehicleId, orderId, status) {
    // Always update local state immediately — optimistic UI.
    const stop = currentRoute.stops.find(s => s.order_id === orderId);
    if (stop) stop.status = status;
    saveToStorage(STORAGE_KEYS.ROUTE_DATA, currentRoute);

    // Show toast feedback immediately
    showToast(
        status === 'delivered' ? 'Delivered!' : 'Marked failed',
        status
    );

    // Update progress bar and header stats immediately (no delay)
    updateProgressBar();
    updateHeaderStats();

    // Delay re-render for toast visibility, then auto-advance
    setTimeout(() => {
        renderStopList();
    }, 1500);

    // Send to server — the API expects a JSON body with { status: "..." }
    // See: apps/kerala_delivery/api/main.py StatusUpdate model
    try {
        const resp = await authPost(
            `${API_BASE}/api/routes/${vehicleId}/stops/${orderId}/status`,
            { status },
        );
        if (!resp.ok) throw new Error('Server rejected update');
    } catch {
        // Network failed — queue for replay when connectivity returns.
        // The local state is already updated, so the driver isn't blocked.
        queueOfflineUpdate(vehicleId, orderId, status);
        console.log(`[Offline] Queued status update: ${orderId} → ${status}`);
    }
}

// ============================================================
// GPS Telemetry — periodic pings for speed alerts & tracking
// ============================================================
// Non-negotiable safety constraint: the system must flag GPS speed
// > 40 km/h in urban zones (Kerala MVD directive). This requires
// the driver app to periodically submit location data.
//
// Flow:
//   1. When a route is loaded, startTelemetry() begins watching GPS
//   2. Every TELEMETRY_INTERVAL_MS, a ping is sent to /api/telemetry
//   3. If the server responds with speed_alert=true, a gentle
//      non-distracting warning is shown (NOT a panic alarm)
//   4. Pings are queued in localStorage when offline
//
// Battery note: navigator.watchPosition with enableHighAccuracy is more
// battery-efficient than repeated getCurrentPosition calls. It lets
// the OS batch GPS reads with other apps requesting location.

let lastGpsPosition = null;

function startTelemetry() {
    if (telemetryIntervalId) return; // Already running
    if (!('geolocation' in navigator)) {
        console.warn('[Telemetry] Geolocation not available');
        return;
    }

    // Watch position continuously — the OS is smarter about battery
    // than polling getCurrentPosition repeatedly.
    navigator.geolocation.watchPosition(
        (pos) => { lastGpsPosition = pos; },
        (err) => console.warn('[Telemetry] GPS error:', err.message),
        { enableHighAccuracy: true, maximumAge: 10_000 }
    );

    // Send the latest cached position at regular intervals
    telemetryIntervalId = setInterval(sendTelemetryPing, TELEMETRY_INTERVAL_MS);
    console.log(`[Telemetry] Started (every ${TELEMETRY_INTERVAL_MS / 1000}s)`);
}

function stopTelemetry() {
    if (telemetryIntervalId) {
        clearInterval(telemetryIntervalId);
        telemetryIntervalId = null;
        console.log('[Telemetry] Stopped');
    }
}

async function sendTelemetryPing() {
    if (!lastGpsPosition || !currentRoute) return;

    const { latitude, longitude, speed, accuracy, heading } = lastGpsPosition.coords;
    const vehicleId = loadFromStorage(STORAGE_KEYS.VEHICLE_ID);
    if (!vehicleId) return;

    const ping = {
        vehicle_id: vehicleId,
        latitude,
        longitude,
        // GPS speed is in m/s; convert to km/h for the API
        speed_kmh: speed != null ? speed * 3.6 : null,
        accuracy_m: accuracy,
        heading: heading,
        recorded_at: new Date(lastGpsPosition.timestamp).toISOString(),
    };

    try {
        const resp = await authPost(`${API_BASE}/api/telemetry`, ping);
        if (resp.ok) {
            const data = await resp.json();
            handleSpeedAlert(data.speed_alert, data.message);
        }
    } catch {
        // Offline — queue for replay. Not critical if individual pings are lost.
        console.log('[Telemetry] Offline — ping skipped');
    }
}

// ============================================================
// Speed Alert UI
// ============================================================
// Safety: show a GENTLE visual reminder when the driver exceeds
// 40 km/h. NOT a distracting alarm (we don't want to startle a
// driver who is actively driving). The banner auto-dismisses.

let speedAlertTimeout = null;

function handleSpeedAlert(isAlert, message) {
    const existing = document.getElementById('speed-alert-banner');
    if (!isAlert) {
        if (existing) existing.remove();
        return;
    }

    if (!existing) {
        const banner = document.createElement('div');
        banner.id = 'speed-alert-banner';
        banner.style.cssText =
            'position:fixed;top:48px;left:0;right:0;background:#FF3B30;color:#FFFFFF;' +
            'text-align:center;padding:10px;font-family:Outfit,sans-serif;font-size:14px;font-weight:700;z-index:1002;letter-spacing:0.01em;';
        banner.textContent = '⚠️  Slow down — 40 km/h limit';
        document.body.prepend(banner);
    }

    // Auto-dismiss after 10 seconds so it's not permanent
    clearTimeout(speedAlertTimeout);
    speedAlertTimeout = setTimeout(() => {
        document.getElementById('speed-alert-banner')?.remove();
    }, 10_000);
}

// ============================================================
// Navigation helpers — escape from stuck states
// ============================================================
// These three functions are the "unstuck" mechanisms.
// Without them the driver can be trapped in a view with no way
// to reload data, switch vehicles, or get back to the upload screen.

async function reloadCurrentRoute() {
    // Re-fetch the current vehicle's route from the server.
    // Use this when the supervisor re-runs optimization mid-day
    // and the driver's cached data is stale.
    const vehicleId = loadFromStorage(STORAGE_KEYS.VEHICLE_ID);
    if (!vehicleId) return;
    document.getElementById('all-done-banner')?.remove();
    await loadRoute(vehicleId);
}

function changeVehicle() {
    // Return to the vehicle selector without a full page reload.
    // Clears the cached route so the app won't auto-restore to it next open.
    stopTelemetry();
    saveToStorage(STORAGE_KEYS.ROUTE_DATA, null);
    saveToStorage(STORAGE_KEYS.VEHICLE_ID, null);
    currentRoute = null;

    document.getElementById('route-view').style.display = 'none';
    document.getElementById('progress-section').style.display = 'none';
    document.getElementById('header-actions').style.display = 'none';
    document.getElementById('header-title').textContent = 'LPG Delivery Route';
    document.getElementById('header-stats').textContent = '';
    document.getElementById('all-done-banner')?.remove();

    // Use the in-memory routes list if available; fall back to upload screen
    const cachedRoutes = loadFromStorage(STORAGE_KEYS.ROUTES_LIST);
    if (cachedRoutes && cachedRoutes.length > 0) {
        showVehicleSelector(cachedRoutes);
    } else {
        document.getElementById('upload-section').style.display = 'block';
    }
}

function goToUpload() {
    // Return to the upload screen from the vehicle selector.
    document.getElementById('vehicle-selector').classList.remove('visible');
    document.getElementById('upload-section').style.display = 'block';
}
</script>
