# Docker Compose for the Kerala LPG Delivery Route Optimizer
#
# Services:
#   osrm    — Open Source Routing Machine (travel time/distance calculations)
#   vroom   — Vehicle Route Optimizer (assigns orders to vehicles, sequences stops)
#   api     — FastAPI backend (imports CSV, geocodes, triggers optimizer, serves routes)
#
# Usage:
#   1. First time: download Kerala OSM data and preprocess (see SETUP.md)
#   2. docker compose up -d
#   3. Open http://localhost:8000/driver/ for the driver app
#
# The OSRM data must be preprocessed before starting. See infra/osrm/README.md

services:
  # ─── PostgreSQL + PostGIS: persistent storage ──────────────────────
  # Stores orders, routes, vehicles, drivers, telemetry.
  # PostGIS adds spatial types for GPS coordinates and proximity queries.
  # Data persisted via named volume — survives container restarts.  #
  # Why PostGIS instead of plain PostgreSQL?
  # We store GPS coordinates as PostGIS geometry(Point, 4326) instead of
  # plain float columns. This gives us:
  # - Spatial indexes (GiST) for fast proximity queries ("find all drivers
  #   within 500m of this depot")
  # - Built-in functions like ST_Distance, ST_DWithin, ST_MakePoint
  # - Coordinate system awareness (SRID 4326 = WGS84, the GPS standard)
  # The 16-3.5 tag means PostgreSQL 16 + PostGIS 3.5.
  #
  # Why a named volume (pgdata) instead of bind mount?
  # Named volumes are managed by Docker and survive container rebuilds.
  # Bind mounts (-v ./data/postgres:/var/lib/...) tie you to a host path
  # and can cause permission issues on Linux.
  # To reset the database: docker volume rm routing_opt_pgdata
  db:
    image: postgis/postgis:16-3.5
    container_name: lpg-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: routing_opt
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routing_dev_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    # Why healthcheck + condition: service_healthy?
    # Without this, Docker starts all services simultaneously. The API
    # would try to connect to PostgreSQL before it's ready, causing
    # connection refused errors. The healthcheck runs pg_isready every
    # 10 seconds, and Docker waits until it passes before starting
    # dependent services (api). This is Docker Compose's built-in
    # readiness mechanism — no retry loops needed in application code.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing -d routing_opt"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── OSRM Init: auto-download and preprocess Kerala map data ────────
  # Idempotent init container: checks if OSRM data exists, downloads and
  # preprocesses Kerala OpenStreetMap data if missing. Exits immediately
  # if data already exists. This eliminates the manual OSRM setup step.
  #
  # Why an init container instead of baking data into the image?
  # - OSRM preprocessed data is ~1.5 GB — too large for a Docker image
  # - Data needs periodic updates (quarterly OSM refreshes)
  # - Init container runs once, then exits, consuming zero resources
  # See: SETUP.md Step 9 for the manual equivalent
  osrm-init:
    image: osrm/osrm-backend:v5.27.1
    container_name: osrm-init
    volumes:
      - ./data/osrm:/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Check if OSRM data already exists (idempotent)
        if [ -f /data/kerala-latest.osrm.mldgr ]; then
          echo "✓ OSRM data already preprocessed — skipping"
          exit 0
        fi
        echo "→ OSRM data not found — downloading and preprocessing Kerala map..."
        # Install wget if not present (some OSRM images have curl only)
        apt-get update -qq && apt-get install -y -qq wget > /dev/null 2>&1 || true
        # Download Kerala OSM extract (~150 MB)
        if [ ! -f /data/kerala-latest.osm.pbf ]; then
          echo "→ Downloading Kerala OpenStreetMap data (~150 MB)..."
          wget -q --show-progress -O /data/kerala-latest.osm.pbf \
            https://download.openstreetmap.fr/extracts/asia/india/kerala.osm.pbf
        fi
        # OSRM preprocessing pipeline (extract → partition → customize)
        echo "→ Step 1/3: Extracting road network..."
        osrm-extract -p /opt/car.lua /data/kerala-latest.osm.pbf
        echo "→ Step 2/3: Partitioning graph..."
        osrm-partition /data/kerala-latest.osrm
        echo "→ Step 3/3: Customizing graph..."
        osrm-customize /data/kerala-latest.osrm
        echo "✓ OSRM preprocessing complete"
    restart: "no"

  # ─── OSRM: provides travel time/distance matrix ─────────────────────
  # Uses Kerala OpenStreetMap data. Preprocessed with Multi-Level Dijkstra
  # for fastest queries. Runs on port 5000.
  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: osrm-kerala
    ports:
      - "5000:5000"
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/kerala-latest.osrm
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── VROOM: route optimization solver ────────────────────────────────
  # Connects to OSRM for travel times, solves CVRP/VRPTW in milliseconds.
  # Runs on port 3000. Config in infra/vroom-conf/config.yml sets OSRM host.
  vroom:
    image: vroomvrp/vroom-docker:v1.14.0-rc.2
    container_name: vroom-solver
    ports:
      - "3000:3000"
    volumes:
      - ./infra/vroom-conf/config.yml:/vroom-express/config.yml
    environment:
      - VROOM_ROUTER=osrm
    depends_on:
      osrm:
        condition: service_started
    restart: unless-stopped

  # ─── Database Init: auto-run Alembic migrations ──────────────────────
  # Runs `alembic upgrade head` automatically on startup. Idempotent:
  # if schema is already up-to-date, Alembic is a no-op.
  # This eliminates the manual `alembic upgrade head` step.
  #
  # Why a separate container instead of running migrations in the API?
  # - Separation of concerns: migrations run once, API runs continuously
  # - If migrations fail, the API container doesn't start (clear error)
  # - Multiple API replicas won't race on migration execution
  db-init:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: lpg-db-init
    environment:
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
    # Override the default CMD (uvicorn) to run migrations instead.
    # Uses the sync driver because Alembic doesn't support async natively.
    command: >
      sh -c "
        echo '→ Running database migrations...' &&
        alembic upgrade head &&
        echo '✓ Database schema up to date'
      "
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ─── Backend API ─────────────────────────────────────────────────────
  # FastAPI server: handles CSV upload, geocoding, optimization trigger,
  # and serves driver routes. Also serves the driver PWA.
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: lpg-api
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - API_KEY=${API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - OSRM_URL=http://osrm:5000
      - VROOM_URL=http://vroom:3000
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
    volumes:
      - ./data:/app/data
    depends_on:
      db-init:
        condition: service_completed_successfully
      osrm:
        condition: service_started
      vroom:
        condition: service_started
    restart: unless-stopped

# Named volumes — persist data across container restarts
volumes:
  pgdata:
