# Docker Compose for the Kerala LPG Delivery Route Optimizer
#
# Services:
#   osrm    — Open Source Routing Machine (travel time/distance calculations)
#   vroom   — Vehicle Route Optimizer (assigns orders to vehicles, sequences stops)
#   api     — FastAPI backend (imports CSV, geocodes, triggers optimizer, serves routes)
#
# Usage:
#   1. First time: download Kerala OSM data and preprocess (see SETUP.md)
#   2. docker compose up -d
#   3. Open http://localhost:8000/driver/ for the driver app
#
# The OSRM data must be preprocessed before starting. See infra/osrm/README.md

services:
  # ─── PostgreSQL + PostGIS: persistent storage ──────────────────────
  # Stores orders, routes, vehicles, drivers, telemetry.
  # PostGIS adds spatial types for GPS coordinates and proximity queries.
  # Data persisted via named volume — survives container restarts.  #
  # Why PostGIS instead of plain PostgreSQL?
  # We store GPS coordinates as PostGIS geometry(Point, 4326) instead of
  # plain float columns. This gives us:
  # - Spatial indexes (GiST) for fast proximity queries ("find all drivers
  #   within 500m of this depot")
  # - Built-in functions like ST_Distance, ST_DWithin, ST_MakePoint
  # - Coordinate system awareness (SRID 4326 = WGS84, the GPS standard)
  # The 16-3.5 tag means PostgreSQL 16 + PostGIS 3.5.
  #
  # Why a named volume (pgdata) instead of bind mount?
  # Named volumes are managed by Docker and survive container rebuilds.
  # Bind mounts (-v ./data/postgres:/var/lib/...) tie you to a host path
  # and can cause permission issues on Linux.
  # To reset the database: docker volume rm routing_opt_pgdata
  db:
    image: postgis/postgis:16-3.5
    container_name: lpg-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: routing_opt
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routing_dev_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    # Why healthcheck + condition: service_healthy?
    # Without this, Docker starts all services simultaneously. The API
    # would try to connect to PostgreSQL before it's ready, causing
    # connection refused errors. The healthcheck runs pg_isready every
    # 10 seconds, and Docker waits until it passes before starting
    # dependent services (api). This is Docker Compose's built-in
    # readiness mechanism — no retry loops needed in application code.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing -d routing_opt"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── OSRM: provides travel time/distance matrix ─────────────────────
  # Uses Kerala OpenStreetMap data. Preprocessed with Multi-Level Dijkstra
  # for fastest queries. Runs on port 5000.
  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm-kerala
    ports:
      - "5000:5000"
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/kerala-latest.osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── VROOM: route optimization solver ────────────────────────────────
  # Connects to OSRM for travel times, solves CVRP/VRPTW in milliseconds.
  # Runs on port 3000. Config in infra/vroom-conf/config.yml sets OSRM host.
  vroom:
    image: vroomvrp/vroom-docker:v1.14.0-rc.2
    container_name: vroom-solver
    ports:
      - "3000:3000"
    volumes:
      - ./infra/vroom-conf/config.yml:/vroom-express/config.yml
    environment:
      - VROOM_ROUTER=osrm
    depends_on:
      osrm:
        condition: service_started
    restart: unless-stopped

  # ─── Backend API ─────────────────────────────────────────────────────
  # FastAPI server: handles CSV upload, geocoding, optimization trigger,
  # and serves driver routes. Also serves the driver PWA.
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: lpg-api
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - API_KEY=${API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - OSRM_URL=http://osrm:5000
      - VROOM_URL=http://vroom:3000
      - DATABASE_URL=postgresql+asyncpg://routing:${POSTGRES_PASSWORD:-routing_dev_pass}@db:5432/routing_opt
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      osrm:
        condition: service_started
      vroom:
        condition: service_started
    restart: unless-stopped

# Named volumes — persist data across container restarts
volumes:
  pgdata:
